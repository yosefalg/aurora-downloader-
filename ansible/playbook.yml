---
- name: Deploy Aurora Downloader
  hosts: aurora_servers
  become: yes
  vars:
    app_name: aurora
    app_user: aurora
    app_dir: /opt/aurora
    node_version: "20"

  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install dependencies
      apt:
        name:
          - curl
          - git
          - build-essential
          - ffmpeg
          - python3
          - python3-pip
          - nginx
          - postgresql-client
          - redis-tools
        state: present

    - name: Install yt-dlp
      pip:
        name: yt-dlp
        state: latest

    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/false
        home: "{{ app_dir }}"

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Clone repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ app_dir }}"
        version: main
      become_user: "{{ app_user }}"

    - name: Install Node.js
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
        apt-get install -y nodejs

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
        production: yes
      become_user: "{{ app_user }}"

    - name: Generate Prisma client
      command: npx prisma generate
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Build application
      command: npm run build
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      environment:
        NODE_ENV: production

    - name: Configure PM2
      template:
        src: ecosystem.config.js.j2
        dest: "{{ app_dir }}/ecosystem.config.js"

    - name: Start application with PM2
      command: pm2 start ecosystem.config.js
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Configure Nginx
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/aurora

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/aurora
        dest: /etc/nginx/sites-enabled/aurora
        state: link

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted

    - name: Setup logrotate
      template:
        src: logrotate.conf.j2
        dest: /etc/logrotate.d/aurora
