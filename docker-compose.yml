version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aurora
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/aurora
      REDIS_URL: redis://redis:6379
      DOWNLOAD_PATH: /downloads
      NODE_ENV: production
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-32-chars-minimum}
      LOG_LEVEL: info
      RATE_LIMIT_REQUESTS: 30
      RATE_LIMIT_WINDOW: 60000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/downloads
    restart: unless-stopped
    deploy:
      replicas: 2
  worker:
    build: .
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/aurora
      REDIS_URL: redis://redis:6379
      DOWNLOAD_PATH: /downloads
      NODE_ENV: production
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-32-chars-minimum}
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/downloads
    restart: unless-stopped
    deploy:
      replicas: 2
  scheduler:
    build: .
    command: npm run scheduler
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
volumes:
  pgdata:
  redisdata:
  downloads:
