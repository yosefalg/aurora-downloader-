apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora-web
  namespace: aurora
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aurora-web
  template:
    metadata:
      labels:
        app: aurora-web
    spec:
      containers:
        - name: web
          image: aurora-downloader:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aurora-config
            - secretRef:
                name: aurora-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aurora-web
  namespace: aurora
spec:
  type: ClusterIP
  selector:
    app: aurora-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aurora-ingress
  namespace: aurora
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  tls:
    - hosts:
        - aurora.example.com
      secretName: aurora-tls
  rules:
    - host: aurora.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aurora-web
                port:
                  number: 3000
