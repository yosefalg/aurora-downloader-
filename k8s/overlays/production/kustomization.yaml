apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aurora-production

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: aurora-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      kind: Deployment
      name: aurora-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4

configMapGenerator:
  - name: aurora-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - METRICS_ENABLED=true
